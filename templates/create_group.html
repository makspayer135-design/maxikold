{% extends "base.html" %}

{% block title %}Создать группу | MAXиколд{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-body">
                <h4 class="mb-4"><i class="fas fa-users"></i> Создать группу</h4>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Название группы</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Описание</label>
                        <textarea name="description" class="form-control" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Создать группу</button>
                    <a href="{{ url_for('groups') }}" class="btn btn-outline">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
